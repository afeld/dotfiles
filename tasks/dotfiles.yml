- name: List dotfiles
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/dotfiles"
    hidden: true
  register: dotfiles

- name: Symlink dotfiles
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "~/.{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ dotfiles.files | sort(attribute='path') }}"

- name: Symlink Snowflake Cortex Code hooks
  ansible.builtin.file:
    src: "{{ playbook_dir }}/snowflake/cortex/hooks.json"
    dest: ~/.snowflake/cortex/hooks.json
    state: link
    force: true
